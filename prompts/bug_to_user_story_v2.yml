  description: "Bug report -> User Story. Prompt otimizado com Role Prompting, Few-shot Learning e Chain of Thought; saída em Markdown com critérios de aceite testáveis e classificação de requisitos por vocabulário controlado."
  model_target: gemini-2.5-flash
  techniques:
